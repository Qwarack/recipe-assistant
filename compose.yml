services:
  api:
    build:
      context: .
    container_name: recipe-assistant-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data/recipes:/data/recipes
      - ./data/database:/data/database
      - ./data/imports:/data/imports
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  bot:
    build: .
    command: uv run python -m app.bot
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped
